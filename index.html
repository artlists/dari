<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дари</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0c0c0e;
            --surface: #16161a;
            --border: rgba(255,255,255,0.07);
            --text: #f0ede8;
            --muted: #6b6a72;
            --give: #b8f0a0;
            --want: #f7c948;
            --like: #4ade80;
            --pass: #ef4444;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px 12px;
            flex-shrink: 0;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--give) 0%, var(--want) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .icon-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: border-color .2s;
        }
        .icon-btn:hover { border-color: rgba(255,255,255,0.2); }

        /* ── TABS ── */
        .tabs {
            display: flex;
            gap: 4px;
            padding: 0 24px 16px;
            flex-shrink: 0;
        }
        .tab {
            flex: 1;
            padding: 9px 0;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            border-radius: 100px;
            cursor: pointer;
            color: var(--muted);
            transition: all .2s;
            letter-spacing: .02em;
        }
        .tab.active {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* ── VIEWS ── */
        .view { display: none; flex: 1; overflow: hidden; flex-direction: column; }
        .view.active { display: flex; }

        /* ══════════════════════
           SWIPE VIEW
        ══════════════════════ */
        #view-swipe {
            position: relative;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 16px;
        }

        .deck {
            position: absolute;
            inset: 0 16px 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* card */
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 28px;
            display: flex;
            flex-direction: column;
            cursor: grab;
            will-change: transform;
            transition: box-shadow .2s;
            overflow: hidden;
            touch-action: none;
        }
        .card:active { cursor: grabbing; }

        /* stacking visual */
        .card:nth-child(2) {
            transform: translateY(10px) scale(0.96);
            opacity: .7;
            pointer-events: none;
        }
        .card:nth-child(3) {
            transform: translateY(20px) scale(0.92);
            opacity: .4;
            pointer-events: none;
        }
        .card:nth-child(n+4) { opacity: 0; pointer-events: none; }

        /* card internals */
        .card-avatar {
            width: 52px; height: 52px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            font-family: 'Fraunces', serif;
            font-weight: 700;
            flex-shrink: 0;
            margin-bottom: 20px;
        }
        .card-username {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .card-name {
            font-family: 'Fraunces', serif;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 24px;
        }

        .card-divider {
            width: 40px; height: 1px;
            background: var(--border);
            margin-bottom: 24px;
        }

        .card-label {
            font-size: 10px;
            letter-spacing: .12em;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .card-give-label { color: var(--give); }
        .card-want-label { color: var(--want); }

        .card-value {
            font-size: 18px;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 20px;
        }

        .card-desc {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.5;
            margin-top: auto;
        }

        /* swipe overlays */
        .card-overlay-like,
        .card-overlay-pass {
            position: absolute;
            top: 32px;
            font-family: 'Fraunces', serif;
            font-size: 32px;
            font-weight: 700;
            border: 3px solid;
            padding: 6px 16px;
            border-radius: 10px;
            opacity: 0;
            transform: rotate(-15deg);
            pointer-events: none;
        }
        .card-overlay-like {
            left: 28px;
            color: var(--like);
            border-color: var(--like);
            transform: rotate(-15deg);
        }
        .card-overlay-pass {
            right: 28px;
            color: var(--pass);
            border-color: var(--pass);
            transform: rotate(15deg);
        }

        /* action buttons */
        .actions {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            height: 100px;
            flex-shrink: 0;
        }
        .action-btn {
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform .15s, box-shadow .15s;
            flex-shrink: 0;
        }
        .action-btn:active { transform: scale(.9); }

        .btn-pass {
            width: 60px; height: 60px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 26px;
        }
        .btn-pass:hover { border-color: var(--pass); box-shadow: 0 0 0 4px rgba(239,68,68,.12); }

        .btn-like {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--give), #38d67c);
            font-size: 30px;
            box-shadow: 0 8px 32px rgba(74,222,128,.25);
        }
        .btn-like:hover { box-shadow: 0 8px 40px rgba(74,222,128,.4); transform: scale(1.05); }

        .btn-super {
            width: 54px; height: 54px;
            background: var(--surface);
            border: 1px solid rgba(247,201,72,.3);
            font-size: 22px;
        }
        .btn-super:hover { border-color: var(--want); box-shadow: 0 0 0 4px rgba(247,201,72,.1); }

        /* empty state */
        .empty-deck {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--muted);
        }
        .empty-deck span { font-size: 52px; }
        .empty-deck p { font-size: 16px; }

        /* ══════════════════════
           MY OFFERS VIEW
        ══════════════════════ */
        #view-my {
            overflow-y: auto;
            padding: 0 16px 100px;
            gap: 12px;
        }

        .add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px;
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            color: var(--muted);
            transition: all .2s;
            flex-shrink: 0;
        }
        .add-btn:hover { border-color: var(--give); color: var(--give); }

        .offer-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }
        .offer-card-row { display: flex; align-items: flex-start; justify-content: space-between; }
        .offer-card-give { font-size: 17px; font-weight: 500; }
        .offer-card-want { font-size: 14px; color: var(--want); }
        .del-btn {
            background: none; border: none;
            color: var(--muted); font-size: 20px; cursor: pointer;
            line-height: 1;
            padding: 0 0 0 12px;
            flex-shrink: 0;
        }
        .del-btn:hover { color: var(--pass); }

        /* ══════════════════════
           CREATE VIEW (sheet)
        ══════════════════════ */
        #view-create {
            overflow-y: auto;
            padding: 8px 16px 100px;
            gap: 16px;
        }
        .field-label {
            font-size: 11px;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .field-label.green { color: var(--give); }
        .field-label.yellow { color: var(--want); }
        .field-group { display: flex; flex-direction: column; }

        input, textarea {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            padding: 14px 16px;
            outline: none;
            transition: border-color .2s;
            resize: none;
        }
        input:focus, textarea:focus { border-color: rgba(255,255,255,0.25); }

        .publish-btn {
            margin-top: 8px;
            background: linear-gradient(135deg, var(--give), #38d67c);
            border: none;
            border-radius: 16px;
            color: #0c160f;
            font-family: 'DM Sans', sans-serif;
            font-size: 17px;
            font-weight: 600;
            padding: 18px;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
            flex-shrink: 0;
        }
        .publish-btn:hover { opacity: .9; }
        .publish-btn:active { transform: scale(.97); }

        /* ══════════════════════
           MATCH POPUP
        ══════════════════════ */
        .match-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.85);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 24px;
        }
        .match-overlay.visible { display: flex; }
        .match-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 36px 28px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .match-emoji { font-size: 56px; margin-bottom: 16px; }
        .match-title {
            font-family: 'Fraunces', serif;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--give), var(--want));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .match-sub { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
        .match-btns { display: flex; flex-direction: column; gap: 10px; }
        .match-contact {
            background: linear-gradient(135deg, var(--give), #38d67c);
            border: none; border-radius: 14px;
            color: #0c160f;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px; font-weight: 600;
            padding: 15px; cursor: pointer;
        }
        .match-close {
            background: none;
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            padding: 15px; cursor: pointer;
        }

        /* ── animations ── */
        @keyframes cardIn {
            from { opacity: 0; transform: scale(.95) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .card { animation: cardIn .3s ease both; }
        .card:nth-child(2) { animation-delay: .05s; }
        .card:nth-child(3) { animation-delay: .1s; }
    </style>
</head>
<body>

<header>
    <div class="logo">Дари</div>
    <div class="header-right">
        <div class="icon-btn" onclick="showView('create')" title="Создать">✦</div>
    </div>
</header>

<div class="tabs">
    <div class="tab active" onclick="showView('swipe')" id="tab-swipe">Найти</div>
    <div class="tab" onclick="showView('my')" id="tab-my-tab">Мои дары</div>
    <div class="tab" onclick="showView('create')" id="tab-create">+ Создать</div>
</div>

<!-- ═══ SWIPE VIEW ═══ -->
<div id="view-swipe" class="view active">
    <div class="deck" id="deck">
        <div class="empty-deck" id="empty-deck" style="display:none">
            <span>🎁</span>
            <p>Новые дары скоро появятся</p>
        </div>
    </div>
    <div class="actions">
        <button class="action-btn btn-pass" onclick="swipeCard('left')" title="Пропустить">✕</button>
        <button class="action-btn btn-like" onclick="swipeCard('right')" title="Дарить!">♥</button>
        <button class="action-btn btn-super" onclick="swipeCard('super')" title="Супер-мэтч">★</button>
    </div>
</div>

<!-- ═══ MY OFFERS VIEW ═══ -->
<div id="view-my" class="view">
    <div class="add-btn" onclick="showView('create')">
        <span>＋</span> Опубликовать новый дар
    </div>
    <div id="my-list"></div>
</div>

<!-- ═══ CREATE VIEW ═══ -->
<div id="view-create" class="view">
    <div class="field-group">
        <div class="field-label green">Что я дарю</div>
        <input id="inp-have" placeholder="Продукты с фермы, 5 часов в клубе…" />
    </div>
    <div class="field-group">
        <div class="field-label yellow">Что хочу получить</div>
        <input id="inp-need" placeholder="Урок английского, ночь в глэмпинге…" />
    </div>
    <div class="field-group">
        <div class="field-label">Детали (необязательно)</div>
        <textarea id="inp-desc" rows="3" placeholder="Расскажите подробнее…"></textarea>
    </div>
    <button class="publish-btn" onclick="publishOffer()">Опубликовать дар →</button>
</div>

<!-- ═══ MATCH POPUP ═══ -->
<div class="match-overlay" id="match-overlay">
    <div class="match-card">
        <div class="match-emoji">🎉</div>
        <div class="match-title">Совпадение!</div>
        <div class="match-sub" id="match-sub">Вы хотите обменяться</div>
        <div class="match-btns">
            <button class="match-contact" id="match-contact-btn">Написать</button>
            <button class="match-close" onclick="closeMatch()">Позже</button>
        </div>
    </div>
</div>

<script>
    // ─── Telegram WebApp init ───
    const tg = window.Telegram?.WebApp;
    let currentUser = null;

    if (tg) {
        tg.ready();
        tg.expand();
        currentUser = tg.initDataUnsafe?.user;
    }

    // ─── Data ───
    let deck = [];        // cards to show
    let myOffers = JSON.parse(localStorage.getItem('dari_offers') || '[]');

    const DEMO = [
        { id: 1, telegram_id: 111, username: 'anna_farm', name: 'Аня', give: 'Органические овощи с фермы', want: 'Уроки йоги или медитации', desc: 'Доставлю сама по Москве, 5 кг в неделю', color: '#c5f0b8' },
        { id: 2, telegram_id: 222, username: 'ivan_code', name: 'Иван', give: 'Разработка лендинга', want: 'Фотосессия или видеосъёмка', desc: 'React/Next.js, опыт 6 лет', color: '#ffd97a' },
        { id: 3, telegram_id: 333, username: 'masha_photo', name: 'Маша', give: 'Портретная фотосессия (2 ч)', want: 'Массаж или SPA-процедуры', desc: 'Профессиональное оборудование, lightroom', color: '#f5b8d6' },
        { id: 4, telegram_id: 444, username: 'glamp_pro', name: 'Глэмпинг Лес', give: 'Ночь в глэмпинге для двоих', want: 'SMM-ведение или контент', desc: 'Подмосковье, 2 часа от Москвы', color: '#b8d8f0' },
        { id: 5, telegram_id: 555, username: 'chef_dmitry', name: 'Дима', give: 'Мастер-класс по итальянской кухне', want: 'Настройка компьютера / IT-помощь', desc: 'На своей кухне, 3-4 человека', color: '#e8c8a0' },
    ];

    function init() {
        deck = [...DEMO];
        renderDeck();
        renderMyOffers();

        if (tg) {
            tg.sendData?.(JSON.stringify({ type: 'get_listings' }));
        }
    }

    // ─── Views ───
    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

        document.getElementById(`view-${v}`).classList.add('active');
        const tabMap = { swipe: 'tab-swipe', my: 'tab-my-tab', create: 'tab-create' };
        document.getElementById(tabMap[v])?.classList.add('active');

        if (v === 'my') renderMyOffers();
    }

    // ─── Deck rendering ───
    function renderDeck() {
        const container = document.getElementById('deck');
        const empty = document.getElementById('empty-deck');
        // clear cards
        container.querySelectorAll('.card').forEach(c => c.remove());

        if (!deck.length) {
            empty.style.display = 'flex';
            return;
        }
        empty.style.display = 'none';

        // render top 3
        const visible = deck.slice(0, 3).reverse();
        visible.forEach((data, i) => {
            const card = buildCard(data);
            container.appendChild(card);
            if (i === visible.length - 1) attachSwipe(card, data);
        });
    }

    const AVATARS = ['🌿','🎨','📸','🏕️','🍝','🎵','💻','🌸','🏡','✈️'];

    function buildCard(data) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = data.id;

        const avatarEmoji = AVATARS[data.id % AVATARS.length];
        const avatarBg = data.color + '22';
        const avatarColor = data.color;

        card.innerHTML = `
            <div class="card-overlay-like">Дарю ♥</div>
            <div class="card-overlay-pass">Мимо ✕</div>
            <div class="card-avatar" style="background:${avatarBg};color:${avatarColor}">${avatarEmoji}</div>
            <div class="card-username">@${data.username}</div>
            <div class="card-name">${data.name}</div>
            <div class="card-divider"></div>
            <div class="card-label card-give-label">Дарит</div>
            <div class="card-value">${data.give}</div>
            <div class="card-label card-want-label">Хочет</div>
            <div class="card-value">${data.want}</div>
            ${data.desc ? `<div class="card-desc">${data.desc}</div>` : ''}
        `;
        return card;
    }

    function attachSwipe(card, data) {
        let startX = 0, startY = 0, dx = 0, isDragging = false;
        const overlayLike = card.querySelector('.card-overlay-like');
        const overlayPass = card.querySelector('.card-overlay-pass');

        function onStart(e) {
            isDragging = true;
            const point = e.touches ? e.touches[0] : e;
            startX = point.clientX;
            startY = point.clientY;
            card.style.transition = 'none';
        }

        function onMove(e) {
            if (!isDragging) return;
            const point = e.touches ? e.touches[0] : e;
            dx = point.clientX - startX;
            const dy = point.clientY - startY;
            const rot = dx * 0.08;
            card.style.transform = `translateX(${dx}px) translateY(${dy * 0.3}px) rotate(${rot}deg)`;

            const progress = Math.min(Math.abs(dx) / 100, 1);
            if (dx > 0) {
                overlayLike.style.opacity = progress;
                overlayPass.style.opacity = 0;
            } else {
                overlayPass.style.opacity = progress;
                overlayLike.style.opacity = 0;
            }
            e.preventDefault();
        }

        function onEnd() {
            if (!isDragging) return;
            isDragging = false;
            card.style.transition = 'transform .35s cubic-bezier(.25,.46,.45,.94), opacity .35s';

            if (Math.abs(dx) > 100) {
                const dir = dx > 0 ? 'right' : 'left';
                flyOut(card, data, dir);
            } else {
                card.style.transform = '';
                overlayLike.style.opacity = 0;
                overlayPass.style.opacity = 0;
            }
            dx = 0;
        }

        card.addEventListener('mousedown', onStart);
        card.addEventListener('touchstart', onStart, { passive: false });
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);
    }

    function flyOut(card, data, dir) {
        const x = dir === 'right' ? 600 : -600;
        const rot = dir === 'right' ? 30 : -30;
        card.style.transform = `translateX(${x}px) rotate(${rot}deg)`;
        card.style.opacity = '0';

        setTimeout(() => {
            deck = deck.filter(d => d.id !== data.id);
            if (dir === 'right') onLike(data);
            renderDeck();
        }, 350);
    }

    function swipeCard(dir) {
        if (!deck.length) return;
        const topCard = document.querySelector('.card:last-child');
        const data = deck[deck.length - 1];
        if (!topCard) return;

        if (dir === 'super') {
            topCard.style.transition = 'transform .35s ease, opacity .35s';
            topCard.style.transform = 'translateY(-600px) scale(0.9)';
            topCard.style.opacity = '0';
            setTimeout(() => {
                deck = deck.filter(d => d.id !== data.id);
                onLike(data, true);
                renderDeck();
            }, 350);
        } else {
            flyOut(topCard, data, dir);
        }
    }

    function onLike(data, isSuper = false) {
        tg?.HapticFeedback?.impactOccurred('medium');
        tg?.sendData?.(JSON.stringify({ type: 'like', partner_id: data.telegram_id, listing_id: data.id }));

        // Show match popup (demo: always match)
        setTimeout(() => showMatch(data, isSuper), 200);
    }

    // ─── Match popup ───
    function showMatch(data, isSuper) {
        document.getElementById('match-sub').textContent =
            `${isSuper ? '⭐ Супер-мэтч с' : 'Мэтч с'} @${data.username}`;
        document.getElementById('match-contact-btn').onclick = () => {
            window.open(`https://t.me/${data.username}`, '_blank');
        };
        document.getElementById('match-overlay').classList.add('visible');
    }

    function closeMatch() {
        document.getElementById('match-overlay').classList.remove('visible');
    }

    // ─── My offers ───
    function renderMyOffers() {
        const list = document.getElementById('my-list');
        list.innerHTML = '';

        if (!myOffers.length) {
            list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:32px 0;font-size:14px">Пока нет даров — создайте первый!</div>';
            return;
        }

        myOffers.forEach(o => {
            const el = document.createElement('div');
            el.className = 'offer-card';
            el.innerHTML = `
                <div class="offer-card-row">
                    <div>
                        <div class="card-label card-give-label" style="margin-bottom:4px">Дарю</div>
                        <div class="offer-card-give">${o.give}</div>
                    </div>
                    <button class="del-btn" onclick="deleteOffer(${o.id})">×</button>
                </div>
                <div>
                    <div class="card-label card-want-label" style="margin-bottom:4px">Хочу</div>
                    <div class="offer-card-want">${o.want}</div>
                </div>
                ${o.desc ? `<div class="card-desc">${o.desc}</div>` : ''}
            `;
            list.appendChild(el);
        });
    }

    function deleteOffer(id) {
        myOffers = myOffers.filter(o => o.id !== id);
        localStorage.setItem('dari_offers', JSON.stringify(myOffers));
        renderMyOffers();
    }

    // ─── Publish ───
    function publishOffer() {
        const give = document.getElementById('inp-have').value.trim();
        const want = document.getElementById('inp-need').value.trim();
        const desc = document.getElementById('inp-desc').value.trim();

        if (!give || !want) {
            alert('Заполните «Что дарю» и «Что хочу»');
            return;
        }

        const offer = {
            id: Date.now(),
            telegram_id: currentUser?.id || 0,
            username: currentUser?.username || 'me',
            name: currentUser?.first_name || 'Я',
            give, want, desc,
            color: '#b8f0a0'
        };

        myOffers.unshift(offer);
        localStorage.setItem('dari_offers', JSON.stringify(myOffers));

        tg?.sendData?.(JSON.stringify({
            type: 'new_offer',
            offer: { ...offer, have: give, need: want },
            user: currentUser,
            initData: tg?.initData
        }));

        document.getElementById('inp-have').value = '';
        document.getElementById('inp-need').value = '';
        document.getElementById('inp-desc').value = '';

        showView('my');
    }

    // ─── Bot events ───
    tg?.onEvent?.('message', (e) => {
        try {
            const data = JSON.parse(e.data);
            if (data.type === 'listings') {
                deck = data.listings.map(l => ({ ...l, give: l.have, want: l.need }));
                renderDeck();
            }
            if (data.type === 'match') showMatch({ username: data.username }, false);
        } catch {}
    });

    init();
</script>
</body>
</html>
